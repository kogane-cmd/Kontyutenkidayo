<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>こんちゅうてんき</title>

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      min-height: 100vh;
      margin-left: 10px;
      margin-top: 10px;
    }
    .cool-button {
      background-image: linear-gradient(to right, #113311 0%, #cceecc 100%);
      border: none;
      color: white;
      padding: 15px 32px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 10px;
      box-shadow: 0 9px 12px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
      background-size: 200% auto;
      animation: colorChange 4s linear infinite;
      text-decoration: none;
      display: inline-block;
    }
    .cool-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 16px rgba(0,0,0,0.3);
    }
    @keyframes colorChange {
      0% { background-position: 0% 100%; }
      50% { background-position: 100% 0%; }
      100% { background-position: 0% 100%; }
    }
  </style>
</head>

<body>

  <p><b>気象庁API使用</b></p>

  <!--  TurboWarp -->
  <iframe
    src="https://turbowarp.org/1216706989/embed"
    width="499"
    height="416"
    allowtransparency="true"
    frameborder="0"
    scrolling="no">
  </iframe>

  <h1>こんちゅうてんき</h1>

  <div id="dates" class="card">
    <div id="date-today"></div>
    <div id="date-tomorrow"></div>
    <div id="date-dayafter"></div>
  </div>

  <label for="pref">都道府県を選択：</label>
  <select id="pref">
    <option value="011000">北海道稚内市</option>
    <option value="016010">北海道札幌市</option>
    <option value="020010">青森県青森市</option>
    <option value="030010">岩手県盛岡市</option>
    <option value="040010">宮城県仙台市</option>
    <option value="100010">群馬県前橋市</option>
    <option value="110010">埼玉県さいたま市</option>
    <option value="120010">千葉県千葉市</option>
    <option value="130010">東京都千代田区</option>
    <option value="140010">神奈川県横浜市</option>
    <option value="230010">愛知県名古屋市</option>
    <option value="260010">京都府京都市</option>
    <option value="270000">大阪府大阪市</option>
    <option value="280010">兵庫県神戸市</option>
    <option value="400010">福岡県福岡市</option>
    <option value="410010">佐賀県佐賀市</option>
    <option value="471010">沖縄県那覇市</option>
  </select>

  <div id="weather" class="card">読み込み中...</div>

  <br>

  <a class="cool-button" href="https://memo.zu-ga.net/23631.html">
    不具合、要望を知らせる。
  </a>

  <!-- JS -->
  <script src="script.js"></script>
</body>
</html>
